<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Backoffice – Estudio Jurídico Vázquez</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --crimson: #8b1a2b; --crimson-dark: #6b1220;
      --gold: #c9a84c; --black: #111111; --dark: #1a1a1a;
      --white: #ffffff; --light: #f7f5f2; --gray: #666666; --border: #e0dbd4;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body { font-family:'Lato',sans-serif; background:var(--light); color:var(--black); min-height:100vh; }

    /* ── HEADER ── */
    header {
      background: var(--dark); height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
    }
    .hd-brand {
      font-family:'Playfair Display',serif; font-size:1.05rem;
      font-weight:700; color:var(--white); text-transform:uppercase;
      letter-spacing:0.04em; display:flex; align-items:center; gap:12px;
    }
    .hd-brand span { color: var(--gold); }
    .hd-pill {
      background: var(--crimson); color: var(--white);
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 10px;
    }
    .hd-link { color:rgba(255,255,255,0.45); font-size:0.8rem; text-decoration:none; transition:color .2s; }
    .hd-link:hover { color: var(--gold); }

    /* ── LAYOUT ── */
    .wrap { max-width: 860px; margin: 0 auto; padding: 52px 32px; }

    /* ── PAGE TITLE ── */
    .pg-eyebrow {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--crimson);
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .pg-eyebrow::before { content:''; width:28px; height:2px; background:var(--crimson); }
    .pg-title {
      font-family:'Playfair Display',serif;
      font-size: 2.2rem; font-weight:700; margin-bottom: 6px;
    }
    .pg-sub { font-size:.88rem; color:var(--gray); margin-bottom:48px; }

    /* ── FORM CARD ── */
    .card {
      background: var(--white); border: 1px solid var(--border);
      padding: 36px 40px; margin-bottom: 40px;
    }
    .card-title {
      font-family:'Playfair Display',serif;
      font-size:1.2rem; font-weight:700; margin-bottom:24px;
      padding-bottom:16px; border-bottom:1px solid var(--border);
    }
    .fg { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .fg-row { display:grid; grid-template-columns:1fr 180px; gap:16px; }
    .fl {
      font-size:.68rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:var(--gray);
    }
    .fi, .fs, .fta {
      padding:11px 14px; border:1px solid var(--border);
      font-family:'Lato',sans-serif; font-size:.88rem;
      color:var(--black); background:var(--white); outline:none;
      transition:border-color .2s; -webkit-appearance:none; appearance:none;
    }
    .fi:focus, .fs:focus, .fta:focus {
      border-color:var(--crimson);
      box-shadow: 0 0 0 3px rgba(139,26,43,.08);
    }
    .fta { resize:vertical; min-height:110px; }
    .btn-pub {
      background:var(--crimson); color:var(--white); border:none;
      padding:13px 30px; font-family:'Lato',sans-serif;
      font-size:.82rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; cursor:pointer; transition:background .2s, transform .15s;
    }
    .btn-pub:hover { background:var(--crimson-dark); transform:translateY(-1px); }

    /* ── LISTA ── */
    .lista-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .lista-title {
      font-family:'Playfair Display',serif;
      font-size:1.4rem; font-weight:700;
    }
    .badge-count {
      background:var(--crimson); color:var(--white);
      font-size:.68rem; font-weight:700; padding:3px 10px; letter-spacing:.06em;
    }

    /* ── IMAGEN UPLOAD ── */
    .img-drop {
      border: 2px dashed var(--border); background: var(--light);
      padding: 28px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; position: relative;
    }
    .img-drop:hover, .img-drop.over { border-color: var(--crimson); background: #fdf0f2; }
    .img-drop input[type=file] {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .img-drop-icon { font-size:1.8rem; margin-bottom:8px; }
    .img-drop-txt { font-size:.82rem; color:var(--gray); }
    .img-drop-txt strong { color:var(--crimson); }
    .img-preview-wrap { margin-top:14px; display:none; position:relative; }
    .img-preview-wrap img {
      width:100%; max-height:200px; object-fit:cover;
      border:1px solid var(--border); display:block;
    }
    .img-preview-wrap .btn-rm-img {
      position:absolute; top:8px; right:8px;
      background:rgba(0,0,0,.6); color:#fff; border:none;
      font-size:.7rem; font-weight:700; padding:4px 10px; cursor:pointer;
      font-family:'Lato',sans-serif; letter-spacing:.06em;
    }
    .img-preview-wrap .btn-rm-img:hover { background:var(--crimson); }

    .nov-card {
      background:var(--white); border:1px solid var(--border);
      padding:0; margin-bottom:14px; overflow:hidden;
      display:flex; flex-direction:column;
      transition: box-shadow .2s;
    }
    .nov-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.07); }
    .nov-card-img { width:100%; max-height:180px; object-fit:cover; display:block; }
    .nov-card-inner { padding:20px 24px; display:flex; gap:16px; align-items:flex-start; }
    .nov-body { flex:1; }
    .nov-cat {
      font-size:.6rem; font-weight:700; letter-spacing:.16em;
      text-transform:uppercase; color:var(--crimson); margin-bottom:5px;
    }
    .nov-tit {
      font-family:'Playfair Display',serif;
      font-size:1.05rem; font-weight:700; margin-bottom:7px;
    }
    .nov-txt { font-size:.84rem; color:var(--gray); line-height:1.65; }
    .nov-fecha { font-size:.7rem; color:#bbb; margin-top:10px; }

    .btn-del {
      background:none; border:1px solid var(--border); color:var(--gray);
      padding:7px 14px; font-size:.72rem; font-weight:700;
      font-family:'Lato',sans-serif; cursor:pointer;
      transition:border-color .2s, color .2s; white-space:nowrap;
    }
    .btn-del:hover { border-color:#b91c1c; color:#b91c1c; }

    .empty {
      text-align:center; padding:60px 0; color:var(--gray);
      font-size:.9rem; border:1px dashed var(--border);
    }
    .empty-icon { font-size:2rem; margin-bottom:10px; }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:28px; right:28px; z-index:9999;
      background:var(--dark); color:var(--white);
      padding:13px 22px; font-size:.84rem; font-weight:700;
      box-shadow:0 8px 30px rgba(0,0,0,.25);
      transform:translateY(70px); opacity:0;
      transition:all .32s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;
    }
    .toast.show { transform:translateY(0); opacity:1; }

    @media(max-width:600px){
      .wrap { padding:32px 16px; }
      .card { padding:24px 20px; }
      .fg-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="hd-brand">⚖️ Estudio Jurídico <span>Vázquez</span></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="hd-pill">Backoffice</div>
    <a href="index.html" class="hd-link">← Ver sitio web</a>
  </div>
</header>

<div class="wrap">
  <div class="pg-eyebrow">Administración</div>
  <h1 class="pg-title">Novedades</h1>
  <p class="pg-sub">Publicá avisos, noticias o actualizaciones que se mostrarán en el sitio web.</p>

  <!-- Formulario -->
  <div class="card">
    <div class="card-title">+ Nueva Novedad</div>
    <div class="fg-row">
      <div class="fg">
        <label class="fl">Título *</label>
        <input type="text" id="n-titulo" class="fi" placeholder="Ej: Nuevas consultas disponibles"/>
      </div>
      <div class="fg">
        <label class="fl">Categoría</label>
        <select id="n-cat" class="fs">
          <option>Aviso</option>
          <option>Novedad</option>
          <option>Importante</option>
          <option>Feriado</option>
          <option>Otro</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Contenido *</label>
      <textarea id="n-texto" class="fta" placeholder="Escribí el cuerpo de la novedad…"></textarea>
    </div>
    <div class="fg">
      <label class="fl">Imagen (opcional)</label>
      <div class="img-drop" id="img-drop">
        <input type="file" id="img-input" accept="image/*" onchange="onImgChange(event)"/>
        <div class="img-drop-icon">🖼️</div>
        <div class="img-drop-txt">Arrastrá una imagen o <strong>hacé clic para seleccionar</strong><br/><span style="font-size:.75rem;">JPG, PNG, WEBP — máx. 2 MB</span></div>
      </div>
      <div class="img-preview-wrap" id="img-preview-wrap">
        <img id="img-preview" src="" alt="Preview"/>
        <button class="btn-rm-img" onclick="quitarImagen()">✕ Quitar</button>
      </div>
    </div>
    <button class="btn-pub" onclick="publicar()">Publicar en el sitio</button>
  </div>

  <!-- Lista -->
  <div class="lista-header">
    <div class="lista-title">Publicadas</div>
    <div class="badge-count" id="badge-count">0</div>
  </div>
  <div id="lista"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let imgBase64 = null;

// ── Drag & drop visual ──
const drop = document.getElementById('img-drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) procesarImagen(file);
});

function onImgChange(e) {
  const file = e.target.files[0];
  if (file) procesarImagen(file);
}

function procesarImagen(file) {
  if (file.size > 2 * 1024 * 1024) { toast('⚠️ La imagen supera los 2 MB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    imgBase64 = ev.target.result;
    document.getElementById('img-preview').src = imgBase64;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function quitarImagen() {
  imgBase64 = null;
  document.getElementById('img-preview').src = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('img-input').value = '';
}

// ── Storage ──
async function storageGet(key) {
  try { const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : {}; }
  catch { return {}; }
}
async function storageSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
}

// ── Publicar ──
async function publicar() {
  const titulo = document.getElementById('n-titulo').value.trim();
  const texto  = document.getElementById('n-texto').value.trim();
  const cat    = document.getElementById('n-cat').value;
  if (!titulo || !texto) { toast('⚠️ Completá título y contenido'); return; }

  const data = await storageGet('novedades');
  const id   = Date.now().toString();
  data[id]   = { id, titulo, texto, categoria: cat, imagen: imgBase64 || null, fecha: new Date().toISOString() };
  await storageSet('novedades', data);

  document.getElementById('n-titulo').value = '';
  document.getElementById('n-texto').value  = '';
  quitarImagen();
  toast('✅ Novedad publicada en el sitio');
  render();
}

// ── Eliminar ──
async function eliminar(id) {
  const data = await storageGet('novedades');
  delete data[id];
  await storageSet('novedades', data);
  toast('🗑️ Novedad eliminada');
  render();
}

// ── Render lista ──
async function render() {
  const data  = await storageGet('novedades');
  const lista = Object.values(data).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  const cont  = document.getElementById('lista');
  document.getElementById('badge-count').textContent = lista.length;

  if (!lista.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No hay novedades publicadas todavía.</div>';
    return;
  }

  cont.innerHTML = lista.map(n => {
    const f = new Date(n.fecha).toLocaleDateString('es-AR', {day:'2-digit', month:'long', year:'numeric'});
    const imgHtml = n.imagen ? `<img class="nov-card-img" src="${n.imagen}" alt="${n.titulo}"/>` : '';
    return `
      <div class="nov-card">
        ${imgHtml}
        <div class="nov-card-inner">
          <div class="nov-body">
            <div class="nov-cat">${n.categoria}</div>
            <div class="nov-tit">${n.titulo}</div>
            <div class="nov-txt">${n.texto}</div>
            <div class="nov-fecha">${f}</div>
          </div>
          <button class="btn-del" onclick="eliminar('${n.id}')">Eliminar</button>
        </div>
      </div>
    `;
  }).join('');
}

let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
